<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WASM Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        html, body { margin:0; height:100%; }
        #map { width:100%; height:100%; }
        canvas { image-rendering: pixelated; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="coords" style="position:absolute;top:10px;left:10px;color:white;"></div>

<script src="build/GoldenBase.js"></script>
<script>
window.addEventListener('load', () => {
  createModule({
      onRuntimeInitialized: function() {
            const scale = 16; // pixels per block
            const Module = this;
            window.Module = Module;

            const getTile = Module.cwrap('getTile', 'number', ['number', 'number', 'number']);

            const tileZoom = 2; // your tiles exist only at this zoom

            const map = L.map('map', {
                crs: L.CRS.Simple,
                minZoom: -2,
                maxZoom: 5,
                zoomSnap: 1,           // snap to integer zooms
                zoomDelta: 1
            });

            L.marker([0, 0]).addTo(map)
                .bindPopup('(0,0)')
                .openPopup();
            L.polyline([[0,0],[0, map.getSize().y]], {color: 'red'}).addTo(map);
            L.polyline([[0,0],[map.getSize().x, 0]], {color: 'blue'}).addTo(map);

            map.on('mousemove', function(e) {
                const xBlock = Math.floor(e.layerX / scale);
                const yBlock = Math.floor(e.layerY / scale);
                document.getElementById('coords').textContent = `Block: ${xBlock}, ${yBlock}`;
            });

            const DynamicLayer = L.GridLayer.extend({
                createTile: function(coords, done) {
                    const tile = document.createElement('canvas');
                    tile.width = scale;
                    tile.height = scale;
                    const ctx = tile.getContext('2d');

                    // Generate tile asynchronously
                    setTimeout(() => {  // or use a Promise / WASM async call
                        const ptr = getTile(coords.x, coords.y, tileZoom);
                        if (ptr) {
                            const raw = new Uint8ClampedArray(Module.HEAPU8.buffer, ptr, scale*scale*4);
                            ctx.putImageData(new ImageData(raw, scale, scale), 0, 0);
                        }
                        done(null, tile); // signal Leaflet that tile is ready
                    }, 0);

                    return tile; // Leaflet needs an initial element immediately
                }
            });

            new DynamicLayer({
                tileSize: scale,
                minZoom: -5,
                maxZoom: 5,
                noWrap: true
            }).addTo(map);

            map.setView([0, 0], tileZoom);
      }
  });
});
</script>

</body>
</html>
