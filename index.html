<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GoldenBase</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        html, body { margin:0; height:100%; }
        #map { width:100%; height:100%; }
        canvas { image-rendering: pixelated; }
    </style>
</head>
<body>

<div style="width: 100%;">
    <span id="coords" style="color:white;"></span>
    <span>
        <input type="number" id="xPos" placeholder="x">
        <input type="number" id="zPos" placeholder="z">
        <button onclick="setPosition()">Go</button>
    </span>

    <span style="margin-right: 0;">
        <input id="seedValue" placeholder="3257840388504953787" disabled="true">
        <button onclick="updateSeedJs()" disabled="true">Set Seed</button>
    </span>
</div>
<div id="map"></div>

<script src="build/GoldenBase.js"></script>
<script src="map.js"></script>

</body>
</html>
