<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WASM Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        html, body { margin:0; height:100%; }
        #map { width:100%; height:100%; }
        canvas { image-rendering: pixelated; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="coords" style="position:absolute;top:10px;left:10px;color:white;"></div>

<script src="build/GoldenBase.js"></script>
<script>
const WORKER_COUNT = navigator.hardwareConcurrency || 4;
const workers = [];
const queue = [];   // pending tile requests
const free = [];    // indices of idle workers

function initWorkers(wasmJsUrl, onReady) {
    let readyCount = 0;
    for (let i = 0; i < WORKER_COUNT; i++) {
        const w = new Worker('tile-worker.js');
        workers.push(w);

        w.onmessage = (e) => {
            if (e.data.type === 'ready') {
                free.push(i);
                if (++readyCount === WORKER_COUNT) onReady();
                return;
            }
            if (e.data.type === 'tile') {
                // Resolve the promise for this tile
                const { id, bytes } = e.data;
                pendingTiles[id]?.(bytes);
                delete pendingTiles[id];

                // Mark worker free, drain queue
                free.push(i);
                dispatch();
            }
        };

        w.postMessage({ type: 'init', wasmJsUrl });
    }
}

const pendingTiles = {}; // id → resolve function
let tileIdCounter = 0;

function requestTile(x, y, z, tileSize) {
    return new Promise((resolve) => {
        const id = tileIdCounter++;
        pendingTiles[id] = resolve;
        queue.push({ x, y, z, tileSize, id });
        dispatch();
    });
}

function dispatch() {
    while (free.length > 0 && queue.length > 0) {
        const workerIdx = free.pop();
        const job = queue.shift();
        workers[workerIdx].postMessage({
            type: 'getTile',
            ...job
        });
    }
}

window.addEventListener('load', () => {
  createModule({
      onRuntimeInitialized: function() {
            initWorkers('build/GoldenBase.js', () => {
                console.log('All workers ready');
            });
            const scale = 16; // pixels per block
            const Module = this;
            window.Module = Module;

            const getTile = Module.cwrap('getTile', 'number', ['number', 'number', 'number']);

            const tileZoom = 2; // your tiles exist only at this zoom

            const map = L.map('map', {
                crs: L.CRS.Simple,
                minZoom: -2,
                maxZoom: 5,
                zoomSnap: 1,           // snap to integer zooms
                zoomDelta: 1
            });

            L.marker([0, 0]).addTo(map)
                .bindPopup('(0,0)')
                .openPopup();
            L.polyline([[0,0],[0, map.getSize().y]], {color: 'red'}).addTo(map);
            L.polyline([[0,0],[map.getSize().x, 0]], {color: 'blue'}).addTo(map);

            map.on('mousemove', function(e) {
                const xBlock = Math.floor(e.layerX / scale);
                const yBlock = Math.floor(e.layerY / scale);
                document.getElementById('coords').textContent = `Block: ${xBlock}, ${yBlock}`;
            });

            const DynamicLayer = L.GridLayer.extend({
                createTile: function(coords, done) {
                    const tile = document.createElement('canvas');
                    tile.width = scale;
                    tile.height = scale;
                    const ctx = tile.getContext('2d');

                    requestTile(coords.x, coords.y, tileZoom, scale).then((bytes) => {
                        ctx.putImageData(new ImageData(bytes, scale, scale), 0, 0);
                        done(null, tile);
                    });

                    return tile;
                }
            });

            new DynamicLayer({
                tileSize: scale,
                minZoom: -5,
                maxZoom: 5,
                noWrap: true
            }).addTo(map);

            map.setView([0, 0], tileZoom);
      }
  });
});
</script>

</body>
</html>
