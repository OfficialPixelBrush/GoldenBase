<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GoldenBase</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta charset="utf-8">
    <meta name="description" content="A ChunkBase-like website for pre-Release Minecraft terrain generation">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/GoldenBase/favicon.ico">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="/GoldenBase/favicon.ico">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-graticule@0.0.1"></script>

    <style>
        html, body { margin:0; height:100%; }
        #map { width:100%; height:100%; }
        canvas { image-rendering: pixelated; }
        .custom-control {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-family: sans-serif;
        }

        .custom-control input, .custom-control select, .custom-control button {
            margin: 2px 0;
        }
    </style>
</head>
<body>

<div id="map">
    <noscript>The interactive map requires javascript to be displayed, please enable javascript in your browser.
    </noscript>
</div>
<script src="GoldenBase.js"></script>
<script src="map.js"></script>

</body>
</html>
