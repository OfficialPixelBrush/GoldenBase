<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GoldenBase</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        html, body { margin:0; height:100%; }
        #map { width:100%; height:100%; }
        canvas { image-rendering: pixelated; }
    </style>
</head>
<body>

<div style="width: 100%;">
    <code id="coords"></code>
    <span>
        <input type="number" id="xPos" placeholder="x" value="0">
        <input type="number" id="zPos" placeholder="z" value="0">
        <button onclick="setPosition()">Go</button>
    </span>

    <label for="genSelection">Generator</label>
    <select name="genSelection" id="genSelection">
        <option value="3">Beta 1.7.3</option>
        <option value="2">Infdev 20100327</option>
        <option value="1">Infdev 20100227</option>
    </select>

    <span style="margin-right: 0;">
        <input id="seedValue" placeholder="" value="3257840388504953787">
        <button onclick="updateGenJs()">Update Gen</button>
    </span>
</div>
<div id="map"></div>

<script src="GoldenBase.js"></script>
<script src="map.js"></script>

</body>
</html>
