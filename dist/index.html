<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GoldenBase</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta charset="utf-8">
    <meta name="description" content="A ChunkBase-like website for pre-Release Minecraft terrain generation">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/GoldenBase/favicon.ico">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="/GoldenBase/favicon.ico">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        html, body { margin:0; height:100%; }
        #map { width:100%; height:100%; }
        canvas { image-rendering: pixelated; }
    </style>
</head>
<body>

<div style="width: 100%;">
    <code id="coords"></code>
    <span>
        <input type="number" id="xPos" placeholder="x" value="0">
        <input type="number" id="zPos" placeholder="z" value="0">
        <button onclick="setPosition()">Go</button>
    </span>
    
    <label for="genSelection">Generator</label>
    <select name="genSelection" id="genSelection">
        <option value="3">Alpha 1.2.0 - Beta 1.7.3</option>
        <option value="4">Infdev 20100611 - Alpha 1.1.2_01</option>
        <option value="2">Infdev 20100327</option>
        <option value="1">Infdev 20100227</option>
    </select>

    <span style="margin-right: 0;">
        <label for="seedValue">Seed</label>
        <input id="seedValue" placeholder="" value="3257840388504953787">
        <button onclick="updateGenJs()">Update Gen</button>
    </span>
    <details>
        <summary>Visualizer Settings</summary>
        <span>
            <input type="checkbox" id="check_heightmap" name="check_heightmap" value="Heightmap">
            <label for="check_heightmap">Heightmap</label><br>
            <input type="checkbox" id="check_blockcolors" name="check_blockcolors" value="Block colors">
            <label for="check_blockcolors">Block colors</label><br>
        </span>
    </details>
</div>
<div id="map"></div>

<script src="GoldenBase.js"></script>
<script src="map.js"></script>

</body>
</html>
